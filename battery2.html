<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery</title>

<style>
.main{
    margin-top: 50px;
}

.battery-top{
    width: 30px;
    height: 18px;
    background: black;
    margin: 0 auto;
    border: 3px solid silver;
    border-top-right-radius: 8px;
    border-bottom-left-radius: 8px;
}

.battery-content{
    width: 150px;
    height: 250px;
    background: black;
    position: relative;
    margin: 0 auto;
    border: 3px solid silver;
    border-radius: 18px;
    overflow: hidden;
}

.charge{
    width: 100%;
    height: 0%;
    position: absolute;
    bottom: 0;
    left: 0;
    border-radius: 14px;
    animation: Battery 5s linear infinite;
}

@keyframes Battery {
    0%{
        height: 0%;
        background: red;
    }
    25%{
        height: 25%;
        background: orange;
    }
    50%{
        height: 50%;
        background: yellow;
    }
    75%{
        height: 75%;
        background: lightgreen;
    }
    100%{
        height: 100%;
        background: green;
    }
}
</style>

</head>

<body>
<div class="main">
    <div class="battery-top"></div>
    <div class="battery-content">
        <div class="charge"></div>
    </div>
</div>
</body>
</html>
